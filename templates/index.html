<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Messenger</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    height: 100vh;
}

/* левая панель */
#users {
    width: 25%;
    background: #2c2c2c;
    color: white;
    padding: 10px;
    overflow-y: auto;
}

/* заголовок users */
#users-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* норм кнопка */
#addBtn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: #0078ff;
    color: white;
    cursor: pointer;
    font-size: 18px;
}

/* чат */
#chat-container {
    width: 75%;
    display: flex;
    flex-direction: column;
}

#chat {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    background: #1e1e1e;
    color: white;
}

/* сообщения */
.msg {
    max-width: 60%;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
}

.left {
    background: #444;
    align-self: flex-start;
}

.right {
    background: #0078ff;
    align-self: flex-end;
}

/* ввод */
#input {
    display: flex;
}

input {
    flex: 1;
    padding: 10px;
}

button {
    padding: 10px;
}
</style>
</head>

<body>

<div id="users">
    <div id="users-header">
        <h3>Users</h3>
        <button id="addBtn" onclick="addUser()">+</button>
    </div>

    <div id="userList"></div>
</div>

<div id="chat-container">
    <div id="chat"></div>

    <div id="input">
        <input id="msg" placeholder="message">
        <button onclick="send()">➤</button>
    </div>
</div>

<script src="/static/script.js"></script>

</body>
</html>
