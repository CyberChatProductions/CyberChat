<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CyberChat</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f0f0f;
            color: white;
        }

        #auth {
            display: flex;
            flex-direction: column;
            width: 200px;
            margin: 100px auto;
            gap: 10px;
        }

        #app {
            display: none;
            height: 100vh;
        }

        #users {
            width: 200px;
            border-right: 1px solid #333;
            overflow-y: auto;
        }

        .user {
            padding: 10px;
            cursor: pointer;
        }

        .user:hover {
            background: #222;
        }

        #chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .msg {
            margin: 5px 0;
            padding: 5px;
        }

        .me {
            text-align: right;
            color: lime;
        }

        .other {
            text-align: left;
            color: white;
        }

        #input {
            display: flex;
        }

        #msg {
            flex: 1;
            padding: 10px;
        }
    </style>
</head>

<body>

<div id="auth">
    <input id="u" placeholder="username">
    <input id="p" placeholder="password">
    <button onclick="register()">register</button>
    <button onclick="login()">login</button>
</div>

<div id="app">
    <div id="users"></div>

    <div id="chat">
        <div id="messages"></div>

        <div id="input">
            <input id="msg" placeholder="message">
            <button onclick="send()">send</button>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>

</body>
</html>
