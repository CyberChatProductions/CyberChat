<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CyberChat</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}

/* AUTH */
#auth {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.auth-box {
    display: flex;
    gap: 10px;
    background: #1a1a1a;
    padding: 20px;
    border-radius: 10px;
}

.auth-box input {
    padding: 8px;
}

.auth-box button {
    padding: 8px 12px;
    cursor: pointer;
}

/* APP */
#app {
    display: none;
    height: 100vh;
    flex-direction: row;
}

/* USERS */
#sidebar {
    width: 250px;
    background: #151515;
    display: flex;
    flex-direction: column;
}

#users {
    flex: 1;
    overflow-y: auto;
}

.user {
    padding: 10px;
    cursor: pointer;
}

.user:hover {
    background: #222;
}

/* + button */
#addUser {
    background: #2b2b2b;
    padding: 15px;
    text-align: center;
    cursor: pointer;
}

/* CHAT */
#chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

#topbar {
    height: 50px;
    background: #1a1a1a;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 15px;
}

#settingsBtn {
    cursor: pointer;
}

#messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg {
    margin: 5px 0;
    padding: 6px;
}

.me { text-align: right; color: lime; }
.other { text-align: left; color: white; }

/* input */
#input {
    display: flex;
    border-top: 1px solid #333;
}

#msg {
    flex: 1;
    padding: 10px;
    background: #111;
    border: none;
    color: white;
}

#send {
    padding: 10px 15px;
    cursor: pointer;
}
</style>

</head>

<body>

<!-- AUTH -->
<div id="auth">
    <div class="auth-box">
        <input id="u" placeholder="username">
        <input id="p" placeholder="password">
        <button onclick="register()">register</button>
        <button onclick="login()">login</button>
    </div>
</div>

<!-- APP -->
<div id="app">

    <div id="sidebar">
        <div id="users"></div>
        <div id="addUser">＋ Add user</div>
    </div>

    <div id="chat">

        <div id="topbar">
            <div id="chatName">Select chat</div>
            <div id="settingsBtn">⚙</div>
        </div>

        <div id="messages"></div>

        <div id="input">
            <input id="msg" placeholder="message">
            <button id="send" onclick="send()">send</button>
        </div>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
