<!DOCTYPE html>
<html>
<head>
    <title>CyberChat</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #121212;
            color: white;
        }

        #login {
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        #app {
            display: none;
            height: 100vh;
        }

        #sidebar {
            width: 260px;
            background: #1e1e1e;
            display: flex;
            flex-direction: column;
        }

        #users {
            flex: 1;
            overflow-y: auto;
        }

        .user {
            padding: 12px;
            border-bottom: 1px solid #333;
            cursor: pointer;
        }

        .user:hover {
            background: #333;
        }

        #chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .msg {
            margin: 6px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 60%;
        }

        .me {
            background: #4caf50;
            margin-left: auto;
        }

        .other {
            background: #333;
            margin-right: auto;
        }

        #inputBox {
            display: flex;
            padding: 10px;
            background: #1e1e1e;
        }

        #inputBox input {
            flex: 1;
            padding: 10px;
            background: #2a2a2a;
            border: none;
            color: white;
        }

        button {
            padding: 10px;
            background: #4caf50;
            border: none;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="login">
    <div>
        <h2>CyberChat</h2>
        <input id="nameInput" placeholder="Enter name">
        <button onclick="login()">Enter</button>
    </div>
</div>

<div id="app">
    <div id="sidebar">
        <button onclick="addUser()">+ Add</button>
        <div id="users"></div>
    </div>

    <div id="chat">
        <div id="messages"></div>

        <div id="inputBox">
            <input id="msgInput" placeholder="Message">
            <button onclick="send()">Send</button>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>

</body>
</html>
