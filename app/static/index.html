<!DOCTYPE html>
<html>
<head>
    <title>CyberChat</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #1e1e1e;
            color: white;
        }

        #login {
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        #app {
            display: none;
            height: 100vh;
        }

        #sidebar {
            width: 250px;
            background: #2a2a2a;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        #users {
            flex: 1;
            overflow-y: auto;
        }

        .user {
            padding: 10px;
            background: #333;
            margin-bottom: 5px;
            cursor: pointer;
        }

        .user:hover {
            background: #444;
        }

        #chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .msg {
            margin: 5px 0;
            max-width: 60%;
            padding: 8px;
            border-radius: 8px;
        }

        .me {
            background: #4caf50;
            align-self: flex-end;
        }

        .other {
            background: #555;
            align-self: flex-start;
        }

        #inputBox {
            display: flex;
            padding: 10px;
            background: #2a2a2a;
        }

        #inputBox input {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
    <div>
        <h2>Enter your name</h2>
        <input id="nameInput" placeholder="Name">
        <button onclick="login()">Enter</button>
    </div>
</div>

<!-- APP -->
<div id="app">
    <!-- SIDEBAR -->
    <div id="sidebar">
        <button onclick="addUser()">+ Add user</button>
        <div id="users"></div>
    </div>

    <!-- CHAT -->
    <div id="chat">
        <div id="messages"></div>

        <div id="inputBox">
            <input id="msgInput" placeholder="Message">
            <button onclick="send()">Send</button>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>

</body>
</html>
