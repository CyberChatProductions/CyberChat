<!DOCTYPE html>
<html>
<head>
    <title>Messenger</title>
    <style>
        body { margin:0; font-family: Arial; display:flex; height:100vh; }
        #left { width:250px; border-right:1px solid #ccc; padding:10px; }
        #chat { flex:1; display:flex; flex-direction:column; }
        #messages { flex:1; overflow:auto; padding:10px; }
        #input { display:flex; }
        input { flex:1; padding:10px; }
        button { padding:10px; }
        .user { cursor:pointer; padding:5px; }
        .user:hover { background:#eee; }
    </style>
</head>
<body>

<div id="login">
    <h3>Enter name</h3>
    <input id="nameInput">
    <button onclick="login()">Enter</button>
</div>

<div id="app" style="display:none; width:100%;">
    
    <div id="left">
        <button onclick="addUser()">+ Add user</button>
        <div id="users"></div>
    </div>

    <div id="chat">
        <div id="messages"></div>

        <div id="input">
            <input id="msgInput">
            <button onclick="send()">Send</button>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
