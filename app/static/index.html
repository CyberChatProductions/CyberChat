<!DOCTYPE html>
<html>
<head>
    <title>Messenger</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            height: 100vh;
        }

        #login {
            margin: auto;
            text-align: center;
        }

        #app {
            display: none;
            width: 100%;
        }

        #sidebar {
            width: 250px;
            border-right: 1px solid #ddd;
            padding: 10px;
        }

        #chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        #input {
            display: flex;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }

        .user {
            padding: 8px;
            cursor: pointer;
            border-radius: 5px;
        }

        .user:hover {
            background: #eee;
        }

        .active {
            background: #ddd;
        }
    </style>
</head>
<body>

<div id="login">
    <h2>Enter your name</h2>
    <input id="nameInput" placeholder="Your name">
    <button onclick="login()">Enter</button>
</div>

<div id="app">
    <div id="sidebar">
        <button onclick="addUser()">+ Add user</button>
        <div id="users"></div>
    </div>

    <div id="chat">
        <div id="messages"></div>

        <div id="input">
            <input id="msgInput" placeholder="Message...">
            <button onclick="send()">Send</button>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
