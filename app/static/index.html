<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CyberChat</title>

<style>
:root {
    --bg:#0f0f10;
    --panel:#1a1b1e;
    --panel2:#22232a;
    --text:#e6e6e6;
    --me:#4f7cff;
    --other:#2a2c34;
}

body.light {
    --bg:#f5f6f8;
    --panel:#fff;
    --panel2:#e9ecf2;
    --text:#111;
    --me:#4f7cff;
    --other:#dfe3ea;
}

body {
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
    height:100vh;
}

#login {
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.box {
    background:var(--panel);
    padding:20px;
    border-radius:12px;
    width:280px;
}

input, button {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
}

button {
    background:#4f7cff;
    color:white;
    cursor:pointer;
}

#app {
    display:none;
    height:100vh;
}

#sidebar {
    width:260px;
    background:var(--panel);
    display:flex;
    flex-direction:column;
}

#topbar {
    display:flex;
    justify-content:space-between;
    padding:10px;
}

#users {
    flex:1;
    overflow:auto;
}

.user {
    margin:6px;
    padding:10px;
    background:var(--panel2);
    border-radius:8px;
    cursor:pointer;
}

#chat {
    flex:1;
    display:flex;
    flex-direction:column;
}

#messages {
    flex:1;
    overflow:auto;
    padding:10px;
}

.msg {
    margin:5px;
    padding:8px;
    border-radius:10px;
    max-width:60%;
}

.me { background:var(--me); margin-left:auto; }
.other { background:var(--other); }

#input {
    display:flex;
    padding:10px;
}

#input input {
    flex:1;
    margin:0;
}

#input button {
    width:100px;
    margin-left:10px;
}
</style>
</head>

<body>

<div id="login">
    <div class="box">
        <h3>Login</h3>
        <input id="nameInput" placeholder="username">
        <button onclick="login()">Enter</button>
    </div>
</div>

<div id="app">

    <div id="sidebar">
        <div id="topbar">
            <button onclick="addUser()">+ chat</button>
            <button onclick="toggleTheme()">theme</button>
        </div>

        <div id="users"></div>
    </div>

    <div id="chat">
        <div id="messages"></div>

        <div id="input">
            <input id="msgInput" placeholder="message">
            <button onclick="send()">Send</button>
        </div>
    </div>

</div>

<script src="/static/script.js"></script>

<script>
function toggleTheme() {
    document.body.classList.toggle("light");
}
</script>

</body>
</html>
